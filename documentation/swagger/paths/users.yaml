/api/users/registration:
    post:
        tags: [Users]
        summary: Register a new user
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/UserRegistrationRequest'
                    example:
                        username: max
                        email: max@example.com
                        password: secret123
        responses:
            '201':
                description: User registered. Verification email sent.
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                user:
                                    $ref: '#/components/schemas/UserPublic'
            '400':
                description: Validation error / user exists
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '500':
                description: Server error
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'

/api/users/login:
    post:
        tags: [Users]
        summary: Login and get JWT token
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/UserLoginRequest'
                    example:
                        email: max@example.com
                        password: secret123
        responses:
            '200':
                description: Login successful
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AuthTokenResponse'
            '400':
                description: Invalid credentials / email not verified / validation error
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '500':
                description: Server error
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'

/api/users/verify-email:
    post:
        tags: [Users]
        summary: Verify email with token
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/VerifyEmailRequest'
        responses:
            '200':
                description: Email verified successfully
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                success:
                                    type: boolean
            '400':
                description: Invalid or expired token
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '500':
                description: Server error
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'

/api/users/resend-verification-email:
    post:
        tags: [Users]
        summary: Resend verification email
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ResendVerificationRequest'
        responses:
            '200':
                description: Verification email resent
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
            '404':
                description: User not found
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '500':
                description: Server error
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'

/api/users/me:
    get:
        tags: [Users]
        summary: Get current user profile (auth required)
        description: Returns user profile including orders, reviews, and favorites.
        security:
            - bearerAuth: []
        responses:
            '200':
                description: User profile with orders, reviews, favorites
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                user:
                                    type: object
                                    additionalProperties: true
            '401':
                description: Unauthorized
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '404':
                description: User not found
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '500':
                description: Server error
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'

/api/users/edit:
    patch:
        tags: [Users]
        summary: Edit current user profile (auth required)
        description: Partial update — only provided fields are changed.
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/UserEditRequest'
        responses:
            '200':
                description: Profile updated
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                user:
                                    $ref: '#/components/schemas/UserPublic'
            '401':
                description: Unauthorized
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '404':
                description: User not found
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '500':
                description: Server error
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'

/api/users:
    get:
        tags: [Users]
        summary: List all users (admin only)
        security:
            - bearerAuth: []
        responses:
            '200':
                description: List of users (public fields)
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: '#/components/schemas/UserPublic'
            '401':
                description: Unauthorized
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '403':
                description: Forbidden (admin required)
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '500':
                description: Server error
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
