                            $ref: '#/components/schemas/ErrorMessage'
            '404':
                description: Good not found
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'

/api/goods/stock/{id}:
    patch:
        tags: [Goods]
        summary: Update stock quantity for a good (admin only)
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: string
              description: Good id (PostgreSQL)
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/GoodStockUpdateRequest'
        responses:
            '200':
                description: Stock updated
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                good:
                                    $ref: '#/components/schemas/Good'
            '400':
                description: Invalid stock value
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '401':
