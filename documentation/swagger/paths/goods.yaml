/api/goods:
    get:
        tags: [Goods]
        summary: List all goods
        description: Supports optional authentication (for personalized results).
        responses:
            '200':
                description: List of goods
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: '#/components/schemas/Good'
            '500':
                description: Server error
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
    post:
        tags: [Goods]
        summary: Create a good (admin only)
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/GoodCreateRequest'
        responses:
            '201':
                description: Good created
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                good:
                                    $ref: '#/components/schemas/Good'
            '400':
                description: Validation error
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '401':
                description: Unauthorized
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '403':
                description: Forbidden (admin required)
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'

/api/goods/{id}:
    get:
        tags: [Goods]
        summary: Get good by id
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: string
              description: Good id (PostgreSQL)
        responses:
            '200':
                description: A single good
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                good:
                                    $ref: '#/components/schemas/Good'
            '404':
                description: Good not found
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '500':
                description: Server error
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
    put:
        tags: [Goods]
        summary: Update a good (admin only)
