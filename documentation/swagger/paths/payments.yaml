/api/payments/create/{orderId}:
    post:
        tags: [Payments]
        summary: Create a Stripe Checkout session for an order (auth required)
        security:
            - bearerAuth: []
        parameters:
            - name: orderId
              in: path
              required: true
              schema:
                  type: string
        responses:
            '200':
                description: Stripe Checkout URL
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/PaymentCreateResponse'
            '400':
                description: Payment already completed
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '401':
                description: Unauthorized
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '404':
                description: Order not found
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'

/api/payments/get:
    get:
        tags: [Payments]
        summary: List all payments (admin only)
        security:
            - bearerAuth: []
        responses:
            '200':
                description: List of payment records
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: '#/components/schemas/PaymentRecord'
            '401':
                description: Unauthorized
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '403':
                description: Forbidden (admin required)
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '500':
                description: Server error
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'

/api/payments/webhook:
    post:
        tags: [Payments]
        summary: Stripe webhook endpoint (raw body)
        description: |
            This endpoint expects Stripe webhook requests with a `stripe-signature` header
            and **raw** `application/json` body (handled by `express.raw()`).
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        additionalProperties: true
        responses:
            '200':
                description: Received
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                received:
                                    type: boolean
                            required: [received]
            '400':
                description: Invalid signature
                content:
                    text/plain:
                        schema:
                            type: string
