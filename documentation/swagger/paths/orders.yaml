/api/orders:
    post:
        tags: [Orders]
        summary: Create an order
        description: |
            Authenticated users order directly. Unauthenticated (guest) users must provide
            `email`, `username`, and `password` — a new account will be created automatically.
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/OrderCreateRequest'
        responses:
            '201':
                description: Order created
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                order:
                                    $ref: '#/components/schemas/OrderResponse'
            '400':
                description: Bad request (goods missing / out of stock / size unavailable / guest fields missing)
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                error:
                                    type: string
            '401':
                description: Unauthorized
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '500':
                description: Server error
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                error:
                                    type: string
    get:
        tags: [Orders]
        summary: List all orders (admin only)
        security:
            - bearerAuth: []
        responses:
            '200':
                description: List of orders with items
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: '#/components/schemas/OrderResponse'
            '401':
                description: Unauthorized
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '403':
                description: Forbidden (admin required)
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'

/api/orders/{id}:
    get:
        tags: [Orders]
        summary: Get order details (admin only)
        security:
            - bearerAuth: []
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: string
              description: Order id
        responses:
            '200':
                description: Order with items
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/OrderResponse'
            '401':
                description: Unauthorized
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '403':
                description: Forbidden (admin required)
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
            '404':
                description: Order not found
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                error:
                                    type: string

/api/orders/{userId}:
    get:
        tags: [Orders]
        summary: Get orders by user id (auth required)
        security:
            - bearerAuth: []
        parameters:
            - name: userId
              in: path
              required: true
              schema:
                  type: string
              description: User id
        responses:
            '200':
                description: List of user orders with items
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: '#/components/schemas/OrderResponse'
            '401':
                description: Unauthorized
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ErrorMessage'
