openapi: 3.0.3
info:
    title: ShoesStore Server API
    version: 1.0.0
    description: |
        ShoesStore backend API (Express + TypeScript).
        Download the spec at `GET /openapi.yaml` or browse it at `GET /docs`.
servers:
    - url: http://localhost:3000
      description: Local development
    - url: https://shoesstore-server.onrender.com
      description: Production

tags:
    - name: Users
    - name: Goods
    - name: Orders
    - name: Payments
    - name: Favorites
    - name: History
    - name: Search Info
    - name: Feedbacks
    - name: Waitlist
    - name: Telegram
    - name: Statistic

# ── Paths (split by domain) ──────────────────────────────────────────
# All path definitions are loaded from the paths/ directory at runtime
# by src/docs/swagger.ts. This file serves as the main entry point;
# the swagger.ts loader merges paths and components from sub-files.
paths: {}

# ── Shared schemas ───────────────────────────────────────────────────
# Components are loaded from schemas.yaml at runtime by src/docs/swagger.ts.
components: {}
