openapi: 3.0.3
info:
  title: ShoesStore Server API
  version: 1.0.0
  description: |
    ShoesStore backend API (Express + TypeScript).
servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Users
  - name: Goods
  - name: Orders
  - name: Payments
  - name: History
  - name: Search Info
  - name: Feedbacks

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorMessage:
      type: object
      properties:
        message:
          type: string
      required: [message]

    UserPublic:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: string, format: email }
        role: { type: string, example: user }
      required: [id, username, email]

    UserRegistrationRequest:
      type: object
      properties:
        username: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
      required: [username, email, password]

    UserLoginRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
      required: [email, password]

    AuthTokenResponse:
      type: object
      properties:
        message: { type: string }
        token: { type: string }
        user:
          $ref: '#/components/schemas/UserPublic'
      required: [message, token, user]

    Good:
      type: object
      properties:
        id: { type: string, description: PostgreSQL good id }
        name: { type: string }
        description: { type: string }
        price: { type: number }
        old_price: { type: number, nullable: true }
        category: { type: string }
        is_new: { type: boolean }
        stock_quantity: { type: integer, minimum: 0 }
        sizes:
          type: array
          items: { type: string }
        main_image_url: { type: string, format: uri }
        gallery_urls:
          type: array
          items: { type: string, format: uri }
      required:
        - name
        - description
        - price
        - category
        - is_new
        - stock_quantity
        - sizes
        - main_image_url
        - gallery_urls

    GoodCreateRequest:
      allOf:
        - $ref: '#/components/schemas/Good'

    OrderItemRequest:
      type: object
      properties:
        good_id: { type: string }
        quantity: { type: integer, minimum: 1 }
      required: [good_id, quantity]

    OrderCreateRequest:
      type: object
      properties:
        shipping_address: { type: string }
        payment_method: { type: string, example: card }
        customer_notes: { type: string, nullable: true }
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemRequest'
      required: [shipping_address, payment_method, items]

    PaymentCreateResponse:
      type: object
      properties:
        url: { type: string, format: uri }
      required: [url]

    HistoryAddRequest:
      type: object
      properties:
        goodId: { type: string }
      required: [goodId]

    SearchInfoAddRequest:
      type: object
      properties:
        searchQuery: { type: string }
      required: [searchQuery]

    FeedbackAddRequest:
      type: object
      properties:
        comment: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        goodId: { type: string }
      required: [comment, rating, goodId]

paths:
  /api/users/registration:
    post:
      tags: [Users]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
            example:
              username: max
              email: max@example.com
              password: secret123
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  user:
                    $ref: '#/components/schemas/UserPublic'
        '400':
          description: Validation error / user exists
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '500':
          description: Server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /api/users/login:
    post:
      tags: [Users]
      summary: Login and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
            example:
              email: max@example.com
              password: secret123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          description: Invalid credentials / validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '500':
          description: Server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /api/users:
    get:
      tags: [Users]
      summary: List users (public fields)
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserPublic'
        '500':
          description: Server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /api/goods:
    get:
      tags: [Goods]
      summary: List goods
      responses:
        '200':
          description: List of goods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Good'
        '500':
          description: Server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
    post:
      tags: [Goods]
      summary: Create a good (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoodCreateRequest'
      responses:
        '201':
          description: Good created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  good:
                    $ref: '#/components/schemas/Good'
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '403':
          description: Forbidden (admin required)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /api/orders:
    post:
      tags: [Orders]
      summary: Create an order (auth required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  order:
                    type: object
                    additionalProperties: true
        '400':
          description: Bad request (goods missing / out of stock)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    get:
      tags: [Orders]
      summary: List orders (admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of orders with items
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '403':
          description: Forbidden (admin required)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /api/orders/{id}:
    get:
      tags: [Orders]
      summary: Get order details (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Order with items
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Not found
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '403':
          description: Forbidden (admin required)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /api/payments/create/{orderId}:
    post:
      tags: [Payments]
      summary: Create a Stripe Checkout session for an order (auth required)
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Stripe Checkout URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentCreateResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '404':
          description: Order not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /api/payments/webhook:
    post:
      tags: [Payments]
      summary: Stripe webhook endpoint (raw body)
      description: |
        This endpoint expects Stripe webhook requests with a `stripe-signature` header
        and **raw** `application/json` body (handled by `express.raw()`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received: { type: boolean }
                required: [received]
        '400':
          description: Invalid signature
          content:
            text/plain:
              schema:
                type: string

  /api/history/add:
    post:
      tags: [History]
      summary: Add viewed good to user history (auth required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoryAddRequest'
      responses:
        '201':
          description: History entry created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Missing fields
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '404':
          description: Good not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /api/history/get:
    get:
      tags: [History]
      summary: Get user history (auth required)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: History goods list
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /api/search-info/add:
    post:
      tags: [Search Info]
      summary: Add a search query (auth required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchInfoAddRequest'
      responses:
        '201':
          description: Search info entry created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Missing fields
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /api/search-info/get:
    get:
      tags: [Search Info]
      summary: Get search history (auth required)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Search info list
          content:
            application/json:
              schema:
                type: object
                properties:
                  searchInfo:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /api/feedbacks/add:
    post:
      tags: [Feedbacks]
      summary: Add feedback for a good (auth required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackAddRequest'
      responses:
        '201':
          description: Feedback added
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Missing fields / invalid rating
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '404':
          description: Good not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /api/feedbacks/get:
    get:
      tags: [Feedbacks]
      summary: Get all feedbacks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Feedback list
          content:
            application/json:
              schema:
                type: object
                properties:
                  feedbacks:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

